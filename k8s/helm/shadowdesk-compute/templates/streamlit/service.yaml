apiVersion: v1
kind: Service
metadata:
  name: {{ include "shadowdesk-compute.fullname" . }}-streamlit
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.streamlit.service.type }}
  ports:
    - name: http
      port: {{ .Values.streamlit.service.port }}
      targetPort: http
      {{- if and (eq .Values.streamlit.service.type "NodePort") .Values.streamlit.service.nodePort }}
      nodePort: {{ .Values.streamlit.service.nodePort }}
      {{- end }}
  selector:
    app: streamlit
