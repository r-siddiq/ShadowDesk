{{- if .Values.prometheus.config.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shadowdesk-infra.fullname" . }}-prometheus-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: prometheus
    chart: {{ include "shadowdesk-infra.chart" . }}
data:
  prometheus.yml: |
    {{- .Values.prometheus.config.content | nindent 4 }}
{{- end }}
