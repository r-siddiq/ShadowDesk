# Deprecated bootstrap helper.
#
# Sealed Secrets is now installed by `k8s/bootstrap/setup-kind.sh` using the
# official Helm chart so the CRD and controller stay in sync.
#
# Manual install example:
#   helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#   helm repo update
#   helm upgrade --install sealed-secrets-controller \
#     sealed-secrets/sealed-secrets \
#     --namespace sealed-secrets \
#     --create-namespace \
#     --set-string fullnameOverride=sealed-secrets-controller
