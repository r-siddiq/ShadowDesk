# ShadowDesk Sealed Secrets (Encrypted)
# ============================================================
# IMPORTANT: The encryptedData values below are PLACEHOLDERS.
# They are unique to each Kubernetes cluster and cannot be reused.
#
# TO GENERATE REAL VALUES:
#   1. Run: ./k8s/bootstrap/setup-kind.sh   (or deploy to your cluster)
#   2. Run: ./k8s/bootstrap/seal-secrets.sh
#   3. The generated file replaces this template at k8s/sealed-secrets/shadowdesk-secrets.yaml
#
# SealedSecrets are safe to commit to Git because they can only be
# decrypted by the Sealed Secrets controller running in your cluster.
# ============================================================
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: shadowdesk-minio-secret
  namespace: shadowdesk-storage
spec:
  encryptedData:
    # TODO: Replace with kubeseal output. Run ./k8s/bootstrap/seal-secrets.sh
    minio-access-key: PLACEHOLDER_USE_SEAL_SCRIPT
    minio-secret-key: PLACEHOLDER_USE_SEAL_SCRIPT
