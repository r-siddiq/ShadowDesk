name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          pip install ruff black isort

      - name: Run Ruff
        run: ruff check .

      - name: Run Black
        run: black --check .

      - name: Run isort
        run: isort --check-only .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests
        run: pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./project/coverage.xml

  package-check:
    name: Package Check
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: project
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python packages
        run: python -m compileall cluster_a cluster_b dashboard shared

  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: package-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl for shadowdesk cluster
        run: |
          # For production, you would configure actual kubeconfig
          # This uses the kind cluster from the runner for demonstration
          echo "Configuring kubectl context..."
          # In production, use: kubectl config use-context <prod-context>
          # For now, we verify the helm charts are valid
          helm lint ./k8s/helm/shadowdesk-infra || exit 1
          helm lint ./k8s/helm/shadowdesk-compute || exit 1

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Deploy with ArgoCD CLI
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          # Login to ArgoCD
          argocd login $ARGOCD_SERVER --username admin --password $ARGOCD_TOKEN --insecure --grpc-web

          # Sync the applications
          argocd app sync shadowdesk-infra --force --prune || echo "Infra app sync attempted"
          argocd app sync shadowdesk-compute --force --prune || echo "Compute app sync attempted"

          # Wait for sync to complete
          argocd app wait shadowdesk-infra --timeout 300 || echo "Infra app wait attempted"
          argocd app wait shadowdesk-compute --timeout 300 || echo "Compute app wait attempted"

      - name: Verify deployment
        run: |
          echo "Deployment triggered. Verify with:"
          echo "  argocd app list"
          echo "  kubectl get pods -n shadowdesk-storage"
          echo "  kubectl get pods -n shadowdesk-compute"
